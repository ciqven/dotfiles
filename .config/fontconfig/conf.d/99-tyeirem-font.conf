<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <!-- Match all fonts and add preferred font for the Unicode range -->
    <match>
        <test name="charsets">
            <string>U+101200-U+10126b</string>
        </test>
        <edit name="family" mode="prepend">
            <string>tyeirem</string>
        </edit>
    </match>
</fontconfig>
