<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <!-- Match all fonts and add preferred font for the Unicode range -->
    <match>
        <!-- The range of Unicode characters to match (e.g., U+1F600–U+1F64F for emojis) -->
        <test name="charsets">
            <string>U+101200-U+10126b</string>
        </test>
        <!-- Set your custom font as the preferred font -->
        <edit name="family" mode="prepend">
            <string>tyeirem</string> <!-- Replace with your font's name -->
        </edit>
    </match>
</fontconfig>
